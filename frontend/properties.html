<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Properties - CeylonLands.lk</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
</head>

<body class="bg-gray-100">
    <nav class="bg-white shadow-lg">
        <div class="max-w-7xl mx-auto px-4">
            <div class="flex justify-between items-center py-4">
                <a href="/" class="flex items-center">
                    <img src="/images/logo.png" alt="CeylonLands.lk Logo" class="h-14">
                </a>
                <div class="space-x-6">
                    <a href="/" class="text-gray-700 hover:text-blue-600">Home</a>
                    <a href="/properties.html" class="text-gray-700 hover:text-blue-600">Properties</a>
                    <a href="/dashboard.html" class="text-gray-700 hover:text-blue-600">Dashboard</a>
                    <a href="/dashboard.html?action=post"
                        class="bg-blue-600 text-white px-4 py-2 rounded-lg hover:bg-blue-700">Post Free Ad</a>
                </div>
            </div>
        </div>
    </nav>

    <div class="max-w-7xl mx-auto px-4 py-8">
        <div class="flex gap-8">
            <!-- Filters Sidebar -->
            <div class="w-1/4 bg-white p-4 rounded-lg shadow h-fit">
                <h3 class="font-bold text-lg mb-4">Filters</h3>
                <div class="space-y-4">
                    <div>
                        <label class="block text-sm font-medium mb-1">Property Type</label>
                        <select id="filterType" class="w-full border rounded p-2">
                            <option value="">All</option>
                            <option value="Land">Land</option>
                            <option value="House">House</option>
                            <option value="Apartment">Apartment</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-sm font-medium mb-1">Offer Type</label>
                        <select id="filterOffer" class="w-full border rounded p-2">
                            <option value="">All</option>
                            <option value="Sale">For Sale</option>
                            <option value="Rent">For Rent</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-sm font-medium mb-1">Min Price (LKR)</label>
                        <input type="number" id="filterMinPrice" placeholder="Min" class="w-full border rounded p-2">
                    </div>
                    <div>
                        <label class="block text-sm font-medium mb-1">Max Price (LKR)</label>
                        <input type="number" id="filterMaxPrice" placeholder="Max" class="w-full border rounded p-2">
                    </div>
                    <div>
                        <label class="block text-sm font-medium mb-1">Bedrooms</label>
                        <select id="filterBedrooms" class="w-full border rounded p-2">
                            <option value="">Any</option>
                            <option value="1">1+</option>
                            <option value="2">2+</option>
                            <option value="3">3+</option>
                            <option value="4">4+</option>
                        </select>
                    </div>
                    <button onclick="applyFilters()" class="w-full bg-blue-600 text-white py-2 rounded-lg">Apply
                        Filters</button>
                </div>
            </div>

            <!-- Properties Grid -->
            <div class="w-3/4">
                <div id="propertiesGrid" class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <!-- Properties loaded here -->
                </div>
            </div>
        </div>
    </div>

    <script src="/js/main.js"></script>
</body>

</html>
