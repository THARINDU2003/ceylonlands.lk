<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Properties - CeylonTerrece.com</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="/css/style.css">
    <script>if(localStorage.getItem('theme')==='dark'){document.documentElement.classList.add('dark-theme');}</script>
</head>

<body class="bg-gray-100">
    <!-- Navigation -->
    <nav class="bg-white shadow-lg sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4">
            <div class="flex justify-between items-center py-4">
                <a href="/" class="logo-container flex items-center gap-2">
                    <video src="/images/Logo_name_animated_202604111211.mp4" autoplay loop muted playsinline class="h-16 rounded-lg pointer-events-none"></video>
                </a>
                <div class="flex items-center space-x-6">
                    <a href="/index.html" class="text-gray-700 dark:text-gray-300 hover:text-blue-600 font-medium">Home</a>
                    <a href="/properties.html" class="text-blue-600 font-bold border-b-2 border-blue-600">Properties</a>
                    <a href="/pricing.html" class="text-gray-700 dark:text-gray-300 hover:text-blue-600 font-medium">Ad Plans</a>
                    
                    <!-- Auth Section -->
                    <div id="navGuestLinks" class="flex items-center space-x-4 border-l pl-4 border-gray-200">
                        <a href="/login.html" class="text-gray-700 dark:text-gray-300 hover:text-blue-600 font-medium">Login</a>
                        <a href="/signup.html" class="bg-blue-50 text-blue-600 px-4 py-2 rounded-lg hover:bg-blue-100 font-bold transition">Sign Up</a>
                    </div>
                    
                    <div id="navUserLinks" class="hidden flex items-center space-x-4 border-l pl-4 border-gray-200">
                        <a href="/dashboard.html" class="text-gray-700 dark:text-gray-300 hover:text-blue-600 font-medium flex items-center gap-2">
                            <i class="fas fa-user-circle text-xl"></i>
                            <span id="navUserName">Dashboard</span>
                        </a>
                        <button onclick="window.auth.logout()" class="text-gray-400 hover:text-red-500 transition" title="Logout">
                            <i class="fas fa-sign-out-alt"></i>
                        </button>
                    </div>

                    <a href="/dashboard.html?action=post"
                        class="bg-blue-600 text-white px-4 py-2 rounded-lg hover:bg-blue-700 shadow-md transition transform active:scale-95">Post Free Ad</a>

                    <!-- Language Selector -->
                    <select id="languageSelect" class="bg-white dark:bg-gray-800 text-gray-700 dark:text-gray-300 font-bold border-2 border-gray-200 dark:border-gray-700 text-sm rounded-xl focus:ring-blue-500 focus:border-blue-500 block py-1.5 px-3 ml-4 cursor-pointer outline-none transition shadow-sm hover:border-blue-400">
                        <option value="en">English</option>
                        <option value="si">සිංහල</option>
                        <option value="ta">தமிழ்</option>
                    </select>

                    <!-- Dark Mode Toggle Button -->
                    <button class="dark-mode-toggle text-gray-500 hover:text-blue-600 transition text-2xl focus:outline-none ml-4" title="Toggle Dark Mode">
                        <i class="fas fa-moon"></i>
                    </button>
                </div>
            </div>
        </div>
    </nav>

    <div class="max-w-7xl mx-auto px-4 py-8">
        <div class="flex flex-col md:flex-row gap-8">
            <!-- Filters Sidebar -->
            <div class="w-full md:w-1/4 bg-white p-6 rounded-2xl shadow-sm h-fit">
                <h3 class="font-bold text-xl mb-6 text-gray-800">Search Filters</h3>
                <div class="space-y-6">
                    <div>
                        <label for="filterType" class="block text-sm font-bold text-gray-700 mb-2">Property Type</label>
                        <select id="filterType" class="w-full border-2 border-gray-100 rounded-xl p-3 focus:border-blue-600 outline-none transition">
                            <option value="">All Types</option>
                            <option value="Land">Land</option>
                            <option value="House">House</option>
                            <option value="Apartment">Apartment</option>
                        </select>
                    </div>
                    <div>
                        <label for="filterOffer" class="block text-sm font-bold text-gray-700 mb-2">Offer Type</label>
                        <select id="filterOffer" class="w-full border-2 border-gray-100 rounded-xl p-3 focus:border-blue-600 outline-none transition">
                            <option value="">All Offers</option>
                            <option value="Sale">For Sale</option>
                            <option value="Rent">For Rent</option>
                        </select>
                    </div>
                    <div>
                        <label for="filterMinPrice" class="block text-sm font-bold text-gray-700 mb-2">Min Price (LKR)</label>
                        <input type="number" id="filterMinPrice" placeholder="Min" class="w-full border-2 border-gray-100 rounded-xl p-3">
                    </div>
                    <div>
                        <label for="filterMaxPrice" class="block text-sm font-bold text-gray-700 mb-2">Max Price (LKR)</label>
                        <input type="number" id="filterMaxPrice" placeholder="Max" class="w-full border-2 border-gray-100 rounded-xl p-3">
                    </div>
                    <div>
                        <label for="filterBedrooms" class="block text-sm font-bold text-gray-700 mb-2">Bedrooms</label>
                        <select id="filterBedrooms" class="w-full border-2 border-gray-100 rounded-xl p-3 focus:border-blue-600 outline-none transition">
                            <option value="">Any</option>
                            <option value="1">1+</option>
                            <option value="2">2+</option>
                            <option value="3">3+</option>
                            <option value="4">4+</option>
                        </select>
                    </div>
                    <button onclick="applyFilters()" class="w-full bg-blue-600 text-white py-4 rounded-xl font-bold hover:bg-blue-700 shadow-lg shadow-blue-100 transition">
                        Apply Filters
                    </button>
                    <button onclick="window.location.href='/properties.html'" class="w-full text-gray-500 font-medium py-2 hover:text-blue-600">
                        Reset All
                    </button>
                </div>
            </div>

            <!-- Properties List -->
            <div class="w-full md:w-3/4">
                <div class="flex justify-between items-center mb-6 bg-white p-4 rounded-xl shadow-sm">
                    <h2 class="text-xl font-bold text-gray-800"><span id="propertyCount">Many</span> Properties for sale</h2>
                    <div class="flex items-center gap-2">
                        <span class="text-sm font-bold text-gray-500 uppercase">Sort by</span>
                        <select class="border-b-2 border-gray-300 font-bold text-gray-700 bg-transparent focus:outline-none pb-1 cursor-pointer">
                            <option>Latest</option>
                            <option>Price: Low to High</option>
                            <option>Price: High to Low</option>
                        </select>
                    </div>
                </div>
                <div id="propertiesGrid" class="flex flex-col space-y-2">
                    <!-- Properties will be loaded dynamically by main.js -->
                    <div class="col-span-full py-20 text-center">
                        <div class="animate-pulse flex flex-col items-center">
                            <div class="h-10 w-10 bg-gray-200 rounded-full mb-4"></div>
                            <p class="text-gray-400">Loading properties...</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Footer -->
    <footer class="bg-gray-800 text-white py-12 mt-20">
        <div class="max-w-7xl mx-auto px-4 text-center">
            <div class="flex justify-center items-center mb-6">
                <video src="/images/Logo_name_animated_202604111211.mp4" autoplay loop muted playsinline class="h-16 mx-auto mb-6 rounded-lg pointer-events-none"></video>
            </div>
            <p>&copy; 2026 CeylonTerrece.com - Sri Lanka's Property Marketplace</p>
        </div>
    </footer>

    <script src="/js/theme.js"></script>
    <script src="/js/auth.js"></script>
    <script src="/js/main.js"></script>
    <script>
        function applyFilters() {
            const filters = {
                type: document.getElementById('filterType').value,
                offer: document.getElementById('filterOffer').value,
                minPrice: document.getElementById('filterMinPrice').value,
                maxPrice: document.getElementById('filterMaxPrice').value,
                bedrooms: document.getElementById('filterBedrooms').value
            };
            window.loadProperties(filters);
        }
        
        // Expose to window for inline calls
        window.applyFilters = applyFilters;
    </script>
</body>

</html>
