<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - CeylonLands.lk</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="/css/style.css">
    <script>if(localStorage.getItem('theme')==='dark'){document.documentElement.classList.add('dark-theme');}</script>
</head>

<body class="bg-gray-100 flex items-center justify-center min-h-screen">
    <div class="max-w-md w-full p-8 bg-white shadow-2xl rounded-2xl">
        <div class="text-center mb-8">
            <a href="/" class="inline-block">
                <video src="/images/Website_logo_animated_202604092122.mp4" autoplay loop muted playsinline class="h-20 mx-auto mb-4 rounded-lg pointer-events-none"></video>
            </a>
            <h2 class="text-3xl font-bold text-gray-800">Create Account</h2>
            <p class="text-gray-500">Join the best property marketplace in Sri Lanka</p>
        </div>

        <form id="signupForm" class="space-y-4">
            <div>
                <label class="block text-sm font-semibold text-gray-700 mb-1">Your Full Name</label>
                <div class="relative">
                    <span class="absolute inset-y-0 left-0 pl-3 flex items-center text-gray-400">
                        <i class="fas fa-user"></i>
                    </span>
                    <input type="text" id="name" required 
                           class="w-full pl-10 pr-4 py-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition-all outline-none" 
                           placeholder="John Doe">
                </div>
            </div>

            <div>
                <label class="block text-sm font-semibold text-gray-700 mb-1">Email Address</label>
                <div class="relative">
                    <span class="absolute inset-y-0 left-0 pl-3 flex items-center text-gray-400">
                        <i class="fas fa-envelope"></i>
                    </span>
                    <input type="email" id="email" required 
                           class="w-full pl-10 pr-4 py-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition-all outline-none" 
                           placeholder="your@email.com">
                </div>
            </div>

            <div>
                <label class="block text-sm font-semibold text-gray-700 mb-1">Create Password</label>
                <div class="relative">
                    <span class="absolute inset-y-0 left-0 pl-3 flex items-center text-gray-400">
                        <i class="fas fa-lock"></i>
                    </span>
                    <input type="password" id="password" required 
                           class="w-full pl-10 pr-4 py-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition-all outline-none" 
                           placeholder="••••••••">
                </div>
            </div>

            <div class="flex items-start gap-2 pt-2">
                <input type="checkbox" id="terms" required class="mt-1 w-4 h-4 text-blue-600 rounded">
                <label for="terms" class="text-xs text-gray-600">
                    I agree to the <a href="#" class="text-blue-600 hover:underline">Terms of Service</a> and <a href="#" class="text-blue-600 hover:underline">Privacy Policy</a>
                </label>
            </div>

            <button type="submit" 
                    class="w-full bg-blue-600 text-white font-bold py-4 rounded-xl hover:bg-blue-700 transform transition-all active:scale-95 shadow-lg mt-4">
                Sign Up Now
            </button>
        </form>

        <div class="mt-6 text-center">
            <div class="relative">
                <div class="absolute inset-0 flex items-center">
                    <div class="w-full border-t border-gray-200"></div>
                </div>
                <div class="relative flex justify-center text-sm">
                    <span class="px-2 bg-white text-gray-500 uppercase tracking-wider">Or sign up with</span>
                </div>
            </div>

            <div class="mt-4 flex flex-col gap-2">
                <button class="flex items-center justify-center gap-2 w-full py-2.5 px-4 border border-gray-200 rounded-xl hover:bg-gray-50 transition-colors font-medium">
                    <i class="fab fa-google text-red-500"></i>
                    Google
                </button>
                <button class="flex items-center justify-center gap-2 w-full py-2.5 px-4 border border-gray-200 rounded-xl hover:bg-gray-50 transition-colors font-medium">
                    <i class="fab fa-facebook text-blue-600"></i>
                    Facebook
                </button>
            </div>
        </div>

        <p class="mt-8 text-center text-gray-600">
            Already have an account? 
            <a href="/login.html" class="font-bold text-blue-600 hover:text-blue-700">Log in</a>
        </p>
    </div>

    <!-- Feedback/Success Modal (Optional) -->
    <div id="authMessage" class="fixed top-4 right-4 hidden max-w-xs transform transition-all duration-300 translate-x-full">
        <div class="bg-white border-l-4 border-blue-500 p-4 shadow-xl rounded-lg">
            <p id="authMessageText" class="text-sm font-medium text-gray-800"></p>
        </div>
    </div>

    <script src="/js/theme.js"></script>
    <script src="/js/auth.js"></script>
    <script>
        document.getElementById('signupForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const name = document.getElementById('name').value;
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            
            try {
                // This function will be defined in auth.js
                await window.auth.register(name, email, password);
                showMessage('Account created successfully! Redirecting...', 'success');
                setTimeout(() => window.location.href = '/login.html', 1500);
            } catch (err) {
                showMessage(err.message, 'error');
            }
        });

        function showMessage(text, type) {
            const container = document.getElementById('authMessage');
            const textElement = document.getElementById('authMessageText');
            textElement.innerText = text;
            container.classList.remove('hidden', 'translate-x-full');
            container.classList.add('translate-x-0');
            
            setTimeout(() => {
                container.classList.add('translate-x-full');
                setTimeout(() => container.classList.add('hidden'), 300);
            }, 3000);
        }
    </script>
</body>

</html>
