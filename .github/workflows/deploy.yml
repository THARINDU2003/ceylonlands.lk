name: Auto Deploy to cPanel
on:
  push:
    branches:
      - main  

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploying via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            cd ~/repositories/ceylonterrece.com
            git pull origin main
            cp -R frontend/* /home3/ceylonte/public_html/
            mkdir -p /home3/ceylonte/public_html/app
            cp -R mobile_app/* /home3/ceylonte/public_html/app/